<!doctype html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2048</title>
<meta name="description" content="방향키 또는 스와이프로 숫자 타일을 밀어서 합치는 2048 퍼즐 게임">
<script>
  (function () {
    var stored = localStorage.getItem('theme');
    var theme = stored || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
    document.documentElement.setAttribute('data-theme', theme);
  })();
</script>
<link rel="stylesheet" href="style.css">
</head>
<body>
<main class="game-main">
  <h1 class="game-title">2048</h1>

  <div class="scoreboard">
    <div class="score-box">
      <span class="score-label">SCORE</span>
      <span class="score-value" id="score-value">0</span>
    </div>
    <div class="score-box">
      <span class="score-label">BEST</span>
      <span class="score-value" id="best-value">0</span>
    </div>
  </div>

  <div class="board-wrap">
    <div class="board" id="board" role="grid" aria-label="2048 게임판"></div>

    <div class="overlay" id="overlay" hidden>
      <p class="overlay-message" id="overlay-message"></p>
      <div class="overlay-buttons">
        <button type="button" id="overlay-continue-btn" class="btn btn-secondary" hidden>계속하기</button>
        <button type="button" id="overlay-restart-btn" class="btn btn-primary">새 게임</button>
      </div>
    </div>
  </div>

  <button type="button" id="new-game-btn" class="btn btn-primary">새 게임</button>

  <p class="instructions">방향키 또는 스와이프로 조작하세요.</p>

  <p class="sr-only" role="status" aria-live="polite" id="live-region"></p>
</main>
<script src="game.js" defer></script>
</body>
</html>
